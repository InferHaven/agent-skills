<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="256" height="256" role="img" aria-label="CodeTrain">
  <style>
    .engine{animation:eng 4s cubic-bezier(.4,0,.6,1) infinite}
    @keyframes eng{0%{cy:15.5px;r:3.2px;opacity:1}12%{cy:15.5px;r:3.2px;opacity:1}46%{cy:23.5px;r:4.6px;opacity:1}60%{cy:23.5px;r:4.6px;opacity:1}72%{cy:23.5px;r:4.6px;opacity:0}100%{cy:15.5px;r:3.2px;opacity:0}}
    .stamp{opacity:0;transform:scale(0);transform-box:fill-box;transform-origin:center;animation:stmp 4s ease-in-out infinite}
    @keyframes stmp{0%,44%{opacity:0;transform:scale(0)}46%{opacity:1;transform:scale(0)}64%{opacity:1;transform:scale(1.15)}72%{transform:scale(1)}88%{opacity:1;transform:scale(1)}95%{opacity:0;transform:scale(.9)}100%{opacity:0;transform:scale(0)}}
    @media (prefers-reduced-motion:reduce){.engine{animation:none;opacity:0}.stamp{animation:none;opacity:1;transform:none}}
  </style>
  <rect width="40" height="40" rx="9" fill="#0f141b"/>
  <rect x="0.75" y="0.75" width="38.5" height="38.5" rx="8.25" fill="none" stroke="#39aaaa" stroke-opacity="0.28"/>
  <rect x="5" y="7" width="30" height="26" rx="5" fill="none" stroke="#39aaaa" stroke-width="2"/>
  <path d="M5 14 H35" stroke="#39aaaa" stroke-width="1.3" opacity=".5"/>
  <circle cx="9.5" cy="10.5" r="1.3" fill="#aa3939"/>
  <circle cx="13.5" cy="10.5" r="1.3" fill="#39aaaa" opacity=".7"/>
  <circle cx="17.5" cy="10.5" r="1.3" fill="#39aaaa" opacity=".7"/>
  <g stroke="#39aaaa" stroke-linecap="round"><g stroke-width="1.3"><path d="M12.3 28 H27.7"/><path d="M15.2 23 H24.8"/></g><path d="M11 31 L18 17.5" stroke-width="2"/><path d="M29 31 L22 17.5" stroke-width="2"/></g>
  <circle class="engine" cx="20" cy="15.5" r="3.2" fill="#aa3939"/>
  <g class="stamp"><rect x="11.5" y="18" width="17" height="11" rx="3.2" fill="#39aaaa"/><path d="M16 23.6 L18.9 26.5 L24 20.5" fill="none" stroke="#0f141b" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/></g>
</svg>
